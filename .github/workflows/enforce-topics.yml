name: Enforce Repository Topics

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - "org-policy/topics.map.json"
            - ".github/workflows/enforce-topics.yml"
    schedule:
        - cron: "17 3 * * 1-5"

jobs:
    enforce:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout .github repo
              uses: actions/checkout@v6

            - name: Install jq
              run: |
                  sudo apt-get update
                  sudo apt-get install -y jq

            - name: Install GitHub CLI
              run: |
                  if ! command -v gh >/dev/null 2>&1; then
                    type -p curl >/dev/null || sudo apt-get install -y curl
                    curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
                      | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
                    sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
                    echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
                      | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
                    sudo apt-get update
                    sudo apt-get install -y gh
                  fi

            - name: Authenticate gh
              env:
                  GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
              run: |
                  if [ -z "${GH_TOKEN:-}" ]; then
                    echo "ORG_ADMIN_TOKEN is not set"
                    exit 1
                  fi
                  gh auth status || gh auth login --with-token <<< "$GH_TOKEN"

            - name: Verify topics map exists
              run: |
                  test -f org-policy/topics.map.json || (echo "Missing org-policy/topics.map.json" && exit 1)

            - name: Enforce topics from map
              env:
                  GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
              run: |
                  MAP_FILE="org-policy/topics.map.json"

                  apply_topics() {
                    endpoint="$1"
                    payload="$2"
                    response_file="$(mktemp)"

                    if gh api \
                        -X PUT \
                        -H "Accept: application/vnd.github+json" \
                        "$endpoint" \
                        --input - <<< "$payload" >"$response_file" 2>&1; then
                      cat "$response_file"
                      rm -f "$response_file"
                      return 0
                    else
                      status="$?"
                    fi

                    redirect_url="$(
                      sed -n '/^{/,$p' "$response_file" \
                        | jq -r '.url // empty' 2>/dev/null \
                        || true
                    )"

                    if [ -n "$redirect_url" ]; then
                      redirect_path="${redirect_url#https://api.github.com}"

                      if [ "$redirect_path" != "$redirect_url" ] && [ -n "$redirect_path" ]; then
                        echo "GitHub API redirected $endpoint -> $redirect_path"

                        if gh api \
                            -X PUT \
                            -H "Accept: application/vnd.github+json" \
                            "$redirect_path" \
                            --input - <<< "$payload"; then
                          rm -f "$response_file"
                          return 0
                        fi
                      fi
                    fi

                    cat "$response_file" >&2
                    rm -f "$response_file"
                    return "$status"
                  }

                  jq -r 'to_entries[] | @base64' "$MAP_FILE" | while read -r row; do
                    entry="$(echo "$row" | base64 -d)"
                    repo="$(echo "$entry" | jq -r '.key')"
                    topics_json="$(echo "$entry" | jq -c '.value')"
                    payload="$(jq -cn --argjson names "$topics_json" '{names: $names}')"

                    echo "Applying topics to $repo -> $topics_json"

                    apply_topics "/repos/$repo/topics" "$payload"
                    done
